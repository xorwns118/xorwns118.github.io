<section class="card neumorphism-card-big">
    <div class="blog-list">
        {% for post in paginator.posts %}
        <div class="blog-post">
            <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
                <small>{{ post.date | date: "%B %d, %Y" }}</small>
            <p>{{ post.excerpt }}</p>
        </div>
        {% endif %}
    </div>
</section>
