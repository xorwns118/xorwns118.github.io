<section class="card neumorphism-card-big">
    <h1 class="title">{{site.blog_title}}</h1>
    <div class="blog-list">
        {% assign category = "개발" %}
        {% for post in site.posts %}
        {% if post.categories contains category %}
        <div class="blog-post">
            <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
                <small>{{ post.date | date: "%B %d, %Y" }}</small>
            <p>{{ post.excerpt }}</p>
        </div>
        {% endif %}
        {% endfor %}
    </div>
</section>
