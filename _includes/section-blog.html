<h2>Blog</h2>
<div class="blog-list">
    {% for post in site.posts %}
    <article class="blog-post">
        <h3><a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a></h3>
        <p>{{ post.excerpt | strip_html | truncate: 150 }}</p>
        <small>Published on {{ post.date | date: "%B %d, %Y" }}</small>
    </article>
    {% endfor %}
</div>
